<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#16324E">
<title>Get Your No-Obligation Cash Offer | Flores Property Solutions</title>
<style>
  :root{
    --navy:#16324E; --navy-700:#1E4368; --navy-900:#0E2338;
    --gold:#E3A63C; --gold-600:#C98A24; --paper:#F4F7FA;
    --card:#FFFFFF; --ink:#15242F; --muted:#5C6B7A; --line:#E1E8EF; --ok:#2E7D5B;
    --radius:14px; --shadow:0 10px 30px rgba(16,50,78,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:var(--paper)}
  .wrap{width:100%;max-width:640px;margin:0 auto;padding:0 20px}
  .cta{display:block;width:100%;text-align:center;background:var(--gold);color:#20140A;font-weight:800;padding:17px;border-radius:12px;text-decoration:none;border:none;cursor:pointer}
  .form-card{background:var(--card);padding:26px;border-radius:18px;box-shadow:var(--shadow)}
  input, select{width:100%;padding:14px;margin:8px 0;border:1.5px solid var(--line);border-radius:11px}
  .err{display:none;color:#C0392B;font-weight:600;margin-top:10px}
  .success{display:none;text-align:center;padding:40px 20px}
</style>
</head>
<body>

<section style="padding:40px 0;">
  <div class="wrap">
    <div class="form-card">
      <form id="leadForm" action="https://formspree.io/f/xbdvngol" method="POST">
        <h2>Get your free cash offer</h2>
        <input type="text" name="Property Address" placeholder="Property Address *" required>
        <input type="text" name="Full Name" placeholder="Full Name *" required>
        <input type="email" name="email" placeholder="Email *" required>
        <input type="tel" name="phone" placeholder="Phone Number *" required>
        
        <button type="submit" class="cta" id="submitBtn">Get My Offer</button>
        <div class="err" id="sendErr">Something went wrong. Please try again.</div>
      </form>
      <div id="successMsg" class="success">
        <h2>You're all set!</h2>
        <p>A team member will reach out within 24 hours.</p>
      </div>
    </div>
  </div>
</section>

<script>
  var form = document.getElementById('leadForm');
  var submitBtn = document.getElementById('submitBtn');
  var sendErr = document.getElementById('sendErr');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';
    
    fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    }).then(function(res) {
      if (res.ok) {
        form.style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } else {
        throw new Error('Submission failed');
      }
    }).catch(function() {
      sendErr.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Get My Offer';
    });
  });
</script>
</body>
</html>
